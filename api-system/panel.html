<!DOCTYPE html>
<html>
<head>
  <title>API Control Panel</title>
</head>
<body>

<h2>🔥 API PANEL</h2>

<input id="key" placeholder="API Key"><br><br>
<input id="number" placeholder="Number"><br><br>
<input id="msg" placeholder="Message"><br><br>

<button onclick="send()">Send</button>

<p id="result"></p>

<script>
function send(){
  let key = document.getElementById("key").value;
  let number = document.getElementById("number").value;
  let msg = document.getElementById("msg").value;

  fetch(`/api/send?key=${key}&number=${number}&msg=${msg}`)
  .then(r => r.json())
  .then(d => {
    document.getElementById("result").innerText =
    JSON.stringify(d);
  });
}
</script>

</body>
</html>
