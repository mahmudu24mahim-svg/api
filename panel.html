<!DOCTYPE html>
<html>
<head>
  <title>API Control Panel</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    input { padding:10px; margin:5px; width:250px; }
    button { padding:10px 20px; cursor:pointer; }
    .box { margin-top:30px; }
    pre { background:#222; padding:10px; }
  </style>
</head>
<body>

<h2>🚀 API CONTROL PANEL</h2>

<div class="box">

  <h3>Send API</h3>
  <input id="key" placeholder="API Key"><br>
  <input id="number" placeholder="Number"><br>
  <input id="msg" placeholder="Message"><br>

  <button onclick="sendAPI()">Send</button>

  <pre id="result"></pre>

</div>

<hr>

<div class="box">

  <h3>Check Status</h3>
  <input id="statusKey" placeholder="API Key"><br>

  <button onclick="checkStatus()">Check</button>

  <pre id="status"></pre>

</div>

<script>

const baseURL = "https://api-1-zc5q.onrender.com"; // তোমার Render URL

// ================= SEND API =================
function sendAPI(){
  let key = document.getElementById("key").value;
  let number = document.getElementById("number").value;
  let msg = document.getElementById("msg").value;

  fetch(`${baseURL}/api/send?key=${key}&number=${number}&msg=${msg}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
  });
}

// ================= STATUS =================
function checkStatus(){
  let key = document.getElementById("statusKey").value;

  fetch(`${baseURL}/api/status?key=${key}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("status").innerText =
    JSON.stringify(data, null, 2);
  });
}

</script>

</body>
</html>
